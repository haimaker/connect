name: CI & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to full commit SHAs (mutable tags are a
      # supply-chain risk for a CLI that handles credentials). Update via Dependabot.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    name: Publish to npm
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm trusted publishing (OIDC). No NPM_TOKEN needed.
      id-token: write
    steps:
      # Third-party actions pinned to full commit SHAs (mutable tags are a
      # supply-chain risk for a CLI that handles credentials). Update via Dependabot.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing requires npm >= 11.5.1; Node 22 ships an older npm.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      # OIDC trusted publishing: npm authenticates via the workflow's id-token
      # (no token), and provenance is generated automatically.
      - run: npm publish --access public
